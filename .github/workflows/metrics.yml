name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_1 }}
          user: omarescobartorres10
          # ⬇️ Esto elimina TODO el contenido por defecto ⬇️
          base: ""
          template: classic
          config_timezone: America/El_Salvador
          # ⬇️ Solo activamos el plugin de lenguajes ⬇️
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          plugin_languages_ignored: html, css
          # ⬇️ Guardado del archivo ⬇️
          filename: github-metrics.svg
          output_action: replace
          commit_message: "Actualizar solo lenguajes [skip ci]"

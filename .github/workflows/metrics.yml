name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PAT_1 }}
          user: omarescobartorres10
          template: classic
          base: header, repositories
          config_timezone: America/El_Salvador
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          # ⬇️ Esto guarda el archivo directamente en main ⬇️
          output_action: replace
          filename: github-metrics.svg
          commit_message: "Actualizar estadísticas [skip ci]"
